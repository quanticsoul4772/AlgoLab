name: Build and Release AlgoLab

on:
  push:
    branches:
      - main
      - master
  release:
    types: [created]
  # Permet de lancer ponctuellement à la main depuis l'interface Github
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: algolab_0.1.0_amd64.deb
            asset_name: algolab-linux.deb
          - os: windows-latest
            artifact_name: algolab.exe
            asset_name: algolab-windows.exe
          - os: macos-latest
            artifact_name: algolab
            asset_name: algolab-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            chmod +x scripts/build_deb.sh
            ./scripts/build_deb.sh
          else
            pyinstaller --name algolab --onefile src/algolab/main.py
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create Release Asset
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List Artifacts
        run: ls -R dist/

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/algolab-linux.deb/algolab_0.1.0_amd64.deb
            dist/algolab-windows.exe/algolab.exe
            dist/algolab-macos/algolab
