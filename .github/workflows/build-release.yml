name: Build and Release AlgoLab

on:
  push:
    branches:
      - main
      - master
  release:
    types: [created]
  # Permet de lancer ponctuellement à la main depuis l'interface Github
  workflow_dispatch:

jobs:
  quality:
    name: Quality and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/algolab

      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings --cov=src/algolab --cov-report=term-missing

      - name: Smoke test CLI
        run: algolab examples/hello_world.algo

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Smoke test wheel install
        run: |
          python -m venv .venv-wheel
          source .venv-wheel/bin/activate
          pip install --upgrade pip
          pip install dist/algolab-*.whl
          algolab examples/hello_world.algo
        shell: bash

  build:
    name: Build on ${{ matrix.os }}
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_path: dist/algolab_*_amd64.deb
            asset_name: algolab-linux.deb
          - os: windows-latest
            artifact_path: dist/algolab.exe
            asset_name: algolab-windows.exe
          - os: macos-latest
            artifact_path: dist/algolab
            asset_name: algolab-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            chmod +x scripts/build_deb.sh
            ./scripts/build_deb.sh
          else
            pyinstaller algolab.spec
          fi
        shell: bash

      - name: Smoke test built binary
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            ./dist/algolab examples/hello_world.algo
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            ./dist/algolab.exe examples/hello_world.algo
          else
            ./dist/algolab examples/hello_world.algo
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.artifact_path }}

  build_extension:
    name: Build VS Code Extension
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Package VS Code extension
        run: |
          cd vscode-extension
          npm install
          mkdir -p ../dist
          npx @vscode/vsce package --out ../dist/algolab-vscode.vsix

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: algolab-vscode.vsix
          path: dist/algolab-vscode.vsix

  release:
    name: Create Release Asset
    needs:
      - build
      - build_extension
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List Artifacts
        run: ls -R dist/

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/algolab-linux.deb/algolab_*_amd64.deb
            dist/algolab-windows.exe/algolab.exe
            dist/algolab-macos/algolab
            dist/algolab-vscode.vsix/algolab-vscode.vsix
